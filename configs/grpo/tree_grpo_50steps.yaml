# @package _global_
# Temporary config: GRPO with forward_steps=50 to compare initial reward with REINFORCE

general:
  name: 'tree_grpo_50steps'
  swanlab: 'local'

dataset:
  name: "tree"
  datadir: "data/tree/"
  pin_memory: false

grpo:
  mode: "flow_grpo"
  target_task: "tree"

  pretrained_checkpoint: null
  resume_from_checkpoint: null
  learning_rate: 1e-5
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 1e-4
  adam_epsilon: 1e-8
  warmup_steps: 0
  total_steps: 1

  num_batches_per_epoch: 1
  group_size: 20
  concurrent_sampling_groups: 120
  sample_group_num: 120
  eval_interval: 1000
  enable_visualization: false

  train_batch_size: 20
  num_inner_epochs: 1
  forward_steps: 50
  train_max_steps: 50

  shuffle_training_batches: true

  kl_penalty: 0.005
  entropy_coef: 0.0
  clip_ratio_lower: 0.2
  clip_ratio_upper: 0.28
  adv_clip_max: 5.0

  lr_decay_threshold: 0.7
  lr_decay_window: 1
  lr_decay_factor: 0.5
  lr_decay_min: 1.0e-5
  positive_advantage_weight: 1.0
  per_config_stat_tracking: true
  target_node_count: 64

  reward_type: "tree_graph"
  use_dense_reward: false
  use_continuous_rate_matrix: true
  gradient_accumulation_steps: 20
  max_grad_norm: 5.0
  num_reward_workers: 22
  enable_dynamic_p0: true
  dynamic_p0_alpha: 0.05

  save_every_n_epoch: 10
  use_grpo_step_probs_for_sampling: true
  sampling_temperature: 1.0

  round0_samples: 300
  refine_topk: 5
  refine_topk_early: 5
  refine_topk_late: 3
  refine_num_vars_early: 120
  refine_num_vars_late: 500
  refine_switch_budget: 2000
  noise_fraction_early: 0.25
  noise_fraction_late: 0.2
  noise_switch_budget: 2000
  early_stop_patience: 10000
