# @package _global_

# General Experiment Settings
general:
  name: 'lead_opt_fa7'
  swanlab: 'local'

# Dataset Settings (In-Distribution / MPO)
dataset:
  name: "zinc250k"
  datadir: "data/zinc/"
  remove_h: true
  aromatic: false
  compute_fcd: false
  empty: false
  pin_memory: false

# GRPO Specific Configuration
grpo:
  mode: "flow_grpo"
  target_task: "fa7"

  # Pretrained Checkpoint (User must provide this for fine-tuning)
  pretrained_checkpoint: null  # Set path to your pretrained checkpoint
  resume_from_checkpoint: null
  # RL / Optimization
  learning_rate: 1e-5
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 1e-4
  adam_epsilon: 1e-8
  warmup_steps: 0      # Learning rate warmup steps (gradually increase LR over first steps)
  total_steps: 100000

  num_batches_per_epoch: 1  # Number of sampling batches per epoch
  group_size: 60              # Number of trajectories per GRPO group
  concurrent_sampling_groups: 50   # Number of concurrent sampling groups
  sample_group_num: 50      # Number of groups to sample per epoch
  eval_interval: 5000

  # Docking evaluation (GDPO-style)
  gdpo_eval_every_n_epochs: 10
  gdpo_eval_samples: 2048
  gdpo_eval_sim_threshold: 0.4
  gdpo_eval_out_dir: "gdpo_eval_results"
  gdpo_sa_threshold: 0.5555556
  gdpo_sim_threshold: 0.4
  gdpo_dock_exhaustiveness: 1
  gdpo_dock_num_modes: 5
  gdpo_dock_timeout: 10

  train_batch_size: 20
  num_inner_epochs: 1       # Inner training epochs (Flow-GRPO feature) - Increase to 2 for better utilization
  forward_steps: 100       # Flow-GRPO forward inference/sampling steps (defaults to sample config)
  train_max_steps: 50      # Only train last N steps to reduce VRAM/speed up (sampling records trajectory for this window)


  shuffle_training_batches: true # Shuffle sample order during inner epoch training

  kl_penalty: 0.005        # Reduce KL to let it drift further from prior
  entropy_coef: 0.0
  clip_ratio_lower: 0.2
  clip_ratio_upper: 0.28
  adv_clip_max: 5.0        # Advantage clipping maximum

  lr_decay_threshold: 0.7
  lr_decay_window: 1
  lr_decay_factor: 0.5
  lr_decay_min: 1.0e-5
  positive_advantage_weight: 1.0
  per_config_stat_tracking: true  # Use per-config statistics
  node_count_min: 15
  node_count_max: 38
  enable_dynamic_node_dist: true
  dynamic_node_dist_alpha: 0.05
  dynamic_node_dist_reward_threshold: 0.001
  dynamic_node_dist_buffer_size: 1000


  # Reward & Rate Matrix
  reward_type: "gdpo_docking"
  target_name: "fa7"
  use_dense_reward: false    # Toggle for Dense Reward Calculation
  use_continuous_rate_matrix: true
  gradient_accumulation_steps: 10
  max_grad_norm: 5.0  # Increase from 1.0 to let aggressive updates happen 
  num_reward_workers: 22
  enable_dynamic_p0: true
  dynamic_p0_alpha: 0.05

  save_every_n_epoch: 10
  use_grpo_step_probs_for_sampling: true
  sampling_temperature: 1.0

  seed_eval_csv_path: "data/lead_opt/docking/actives.csv"
  seed_eval_topk: 3
  seed_eval_refine_num_vars: 10000
  seed_eval_refine_batch: 1000
  seed_eval_noise_fraction: 0.3
